name: Publish to CDN

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: github.repository == 'adjust/web_sdk'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          check-latest: true
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build:ci

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v3'
        with:
          project_id: 'websdk'
          workload_identity_provider: 'projects/313880847322/locations/global/workloadIdentityPools/websdk-identity-pool/providers/github-actions-web-sdk'

      #Just for testing
      - name: Create upload probe file
        run: echo "upload test" > /tmp/cdn-upload-probe.txt

      - name: Verify Cloud Storage upload access
        run: gcloud storage cp /tmp/cdn-upload-probe.txt gs://cdn.adjust.com/dry-run/${{ github.run_id }}/cdn-upload-probe.txt

      # - id: 'upload-artifacts'
